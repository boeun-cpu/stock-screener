<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 스크리너</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0c12; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #c8ccd8; min-height: 100vh; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; background: #0f1117; border-radius: 12px; overflow: hidden; border: 0.5px solid #2a2d35; }
.nav { display: flex; gap: 8px; padding: 12px 20px 0; }
.nav a { text-decoration: none; font-size: 14px; padding: 8px 16px; border-radius: 8px 8px 0 0; color: #8090a0; background: #161920; border: 0.5px solid #2a2d35; border-bottom: none; }
.nav a.active { background: #0f1117; color: #6ba3e0; font-weight: 500; }
.header { padding: 14px 20px; border-bottom: 0.5px solid #2a2d35; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.title { color: #e0e2e8; font-size: 16px; font-weight: 500; }
.search-box { background: #1c1f28; border: 0.5px solid #3a3d48; border-radius: 6px; padding: 6px 12px; color: #e0e2e8; font-size: 13px; width: 180px; outline: none; }
.search-box:focus { border-color: #4a7fc0; }
.filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: #1c1f28; border: 0.5px solid #3a3d48; border-radius: 20px; padding: 5px 14px; color: #a0a4b0; font-size: 13px; cursor: pointer; white-space: nowrap; }
.filter-btn.active { background: #2a3a5a; border-color: #4a7fc0; color: #6ba3e0; }
.meta { color: #6b7080; font-size: 13px; margin-left: auto; text-align: right; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #161920; color: #6b7080; font-weight: 400; font-size: 12px; padding: 10px 14px; text-align: right; border-bottom: 0.5px solid #2a2d35; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:first-child, thead th:nth-child(2) { text-align: left; }
thead th:hover { color: #a0a4b0; }
tbody tr { border-bottom: 0.5px solid #1e2130; cursor: pointer; }
tbody tr:hover { background: #161a25; }
td { padding: 10px 14px; text-align: right; color: #c8ccd8; white-space: nowrap; }
td:first-child { text-align: left; color: #6b7080; font-size: 12px; width: 40px; }
td:nth-child(2) { text-align: left; }
.name { color: #d8dce8; font-size: 13px; font-weight: 500; }
.sub { color: #4a5060; font-size: 11px; margin-left: 6px; }
.up { color: #3ec87a; }
.down { color: #e05555; }
.badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 3px; margin-left: 6px; background: #1a3530; color: #3ec87a; border: 0.5px solid #2a5545; }
.pos52 { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.bar-track { width: 80px; height: 4px; background: #2a2d35; border-radius: 2px; position: relative; flex-shrink: 0; }
.bar-fill { height: 100%; background: #3a5080; border-radius: 2px; }
.bar-mark { position: absolute; top: -3px; width: 2px; height: 10px; background: #6ba3e0; border-radius: 1px; }
.pct { color: #8090a0; font-size: 12px; min-width: 34px; text-align: right; }
.state { padding: 60px; text-align: center; color: #6b7080; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="index.html">📈 미국 주식</a>
    <a href="etf.html" class="active">📊 ETF</a>
  </div>
  <div class="header">
    <span class="title">ETF 상세</span>
    <input class="search-box" placeholder="ETF명 티커 검색" id="search" oninput="applyFilters()" />
    <div class="filter-btns" id="catBtns"></div>
    <span class="meta" id="meta">불러오는 중...</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th onclick="sortBy('name')">ETF명 ↕</th>
          <th onclick="sortBy('price')">현재가 ↕</th>
          <th onclick="sortBy('change')">등락률 ↕</th>
          <th onclick="sortBy('turnover')">거래대금 ↓</th>
          <th onclick="sortBy('marketCap')">순자산(백만$) ↕</th>
          <th onclick="sortBy('fromHigh')">고점대비 ↕</th>
          <th onclick="sortBy('pos52')">52주 위치 ↕</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="state" id="state">데이터를 불러오는 중입니다...</div>
  </div>
</div>
<script>
let allStocks = [];
let filtered = [];
let currentFilter = '전체';
let sortKey = 'turnover';
let sortDesc = true;

function fmt(n) { return Math.round(n).toLocaleString(); }

async function load() {
  try {
    const res = await fetch('etf-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('no data');
    const data = await res.json();
    allStocks = data.stocks || [];
    buildCategoryButtons();
    const d = new Date(data.updated);
    document.getElementById('meta').textContent =
      data.count + '개 ETF · ' + d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + ' 갱신';
    document.getElementById('state').style.display = 'none';
    applyFilters();
  } catch (e) {
    document.getElementById('state').textContent =
      '아직 데이터가 없습니다. GitHub Actions를 한 번 실행하면 표시됩니다.';
    document.getElementById('meta').textContent = '';
  }
}

function buildCategoryButtons() {
  const cats = ['전체', ...new Set(allStocks.map(s => s.sector))];
  const wrap = document.getElementById('catBtns');
  wrap.innerHTML = cats.map((c,i) =>
    `<button class="filter-btn ${i===0?'active':''}" onclick="setFilter('${c}',this)">${c}</button>`
  ).join('');
}

function render() {
  const tbody = document.getElementById('tbody');
  const state = document.getElementById('state');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    state.style.display = 'block';
    state.textContent = '조건에 맞는 ETF가 없습니다';
    return;
  }
  state.style.display = 'none';
  tbody.innerHTML = filtered.map((s,i) => {
    const pos = s.pos52;
    const markPct = Math.max(0, Math.min(96, pos));
    return `<tr>
      <td>${i+1}</td>
      <td>
        <span class="name">${s.name}</span>
        <span class="sub">${s.symbol} · ${s.sector}</span>
        ${s.nearHigh ? '<span class="badge">신고가</span>' : ''}
      </td>
      <td>${fmt(s.price)}</td>
      <td class="${s.change>=0?'up':'down'}">${s.change>=0?'+':''}${s.change.toFixed(2)}%</td>
      <td>${fmt(s.turnover)}</td>
      <td>${fmt(s.marketCap)}</td>
      <td class="${s.fromHigh>=-5?'up':'down'}">${s.fromHigh.toFixed(1)}%</td>
      <td>
        <div class="pos52">
          <div class="bar-track">
            <div class="bar-fill" style="width:${pos}%"></div>
            <div class="bar-mark" style="left:${markPct}%"></div>
          </div>
          <span class="pct">${pos}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = allStocks.filter(s => {
    const matchSearch = !q || s.name.toLowerCase().includes(q) || s.symbol.toLowerCase().includes(q);
    const matchFilter = currentFilter === '전체' ? true : s.sector === currentFilter;
    return matchSearch && matchFilter;
  });
  sortFiltered();
  render();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortBy(key) {
  if (sortKey === key) { sortDesc = !sortDesc; }
  else { sortKey = key; sortDesc = true; }
  sortFiltered();
  render();
}

function sortFiltered() {
  filtered.sort((a,b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
    return sortDesc ? bv - av : av - bv;
  });
}

load();
</script>
</body>
</html>
